# ─── Why Hugo? ───
[why_label]
other = "#3. Why Hugo?"
[why_title]
other = "Built for Teams That Ship"
[why_desc]
other = "Whether you're a developer optimizing your toolchain or an executive cutting costs — Hugo delivers."
[why_tab_dev]
other = "FOR DEVELOPERS"
[why_tab_business]
other = "FOR BUSINESS"
[why_view_services]
other = "→ View All Services"

[why_dev1_title]
other = "⚡ Sub-second builds"
[why_dev1_desc]
other = "Hugo compiles 10,000+ pages in under 2 seconds. No build server needed — just <code class=\"text-accent\">hugo</code> on any machine."
[why_dev2_title]
other = "📝 Markdown-native"
[why_dev2_desc]
other = "Write in Markdown with shortcodes. Git-friendly content that your whole team can version-control."
[why_dev3_title]
other = "🔧 Full template control"
[why_dev3_desc]
other = "Go templates give you loops, conditionals, partials, and pagination — without a CMS plugin ecosystem."
[why_dev4_title]
other = "📦 Single binary"
[why_dev4_desc]
other = "One <code class=\"text-accent\">hugo</code> binary, zero dependencies. Install via brew, apt, or download — runs everywhere."
[why_dev5_title]
other = "🔄 Hot reload"
[why_dev5_desc]
other = "<code class=\"text-accent\">hugo server</code> with live reload. Change a Markdown file and see the result in your browser instantly."
[why_dev6_title]
other = "🌐 i18n & multilingual"
[why_dev6_desc]
other = "Built-in internationalization. One content tree, multiple languages, automatic URL localization."
[why_dev7_title]
other = "📊 Build hooks & CI/CD"
[why_dev7_desc]
other = "One command deploys: <code class=\"text-accent\">hugo && netlify deploy</code>. Integrates with GitHub Actions, GitLab CI, Jenkins."
[why_dev8_title]
other = "📸 Image processing"
[why_dev8_desc]
other = "Resize, crop, rotate, and convert images at build time. No JavaScript needed. Responsive images out of the box."

[why_biz1_title]
other = "💰 80% lower hosting costs"
[why_biz1_desc]
other = "Static HTML on a CDN costs pennies. No $200/month managed WordPress hosting. No database server."
[why_biz2_title]
other = "🚀 100× faster page loads"
[why_biz2_desc]
other = "No database queries, no PHP execution. Pages load instantly — improving Core Web Vitals and SEO rankings."
[why_biz3_title]
other = "🔒 Zero security surface"
[why_biz3_desc]
other = "No WordPress plugin vulnerabilities. No Drupal module exploits. No PHP runtime to patch. Ever."
[why_biz4_title]
other = "♻️ Never rebuild again"
[why_biz4_desc]
other = "A Hugo site from 2018 still builds on today's Hugo. No dependency rot, no framework churn."
[why_biz5_title]
other = "📈 Better SEO out of the box"
[why_biz5_desc]
other = "Perfect Lighthouse scores. No render-blocking JS. Clean semantic HTML that search engines love."
[why_biz6_title]
other = "👩‍💻 Developer talent available"
[why_biz6_desc]
other = "Hugo uses Go templates — a widely-known language. No need to find niche WordPress/PHP developers."
[why_biz7_title]
other = "📱 True headless CMS"
[why_biz7_desc]
other = "Pair Hugo with Netlify CMS, Forestry, or Decap CMS. Your editors get a UI — your site stays static."
[why_biz8_title]
other = "📋 Audit-ready"
[why_biz8_desc]
other = "Every deploy is a Git commit. Full change history. Rollback in one click. Compliance teams love this."

