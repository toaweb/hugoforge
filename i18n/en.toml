[about_stat4_label]
other = "Client Retention"
[about_story_p1]
other = "<strong class=\"text-fg\">hugo://forge</strong> was founded by former WordPress agency developers who got tired of patching vulnerabilities, fighting with PHP memory limits, and explaining to clients why their \"simple blog\" needed a $200/month hosting plan."
[about_story_p2]
other = "We discovered Hugo in 2018 and never looked back. Since then we've helped <strong class=\"text-fg\">200+ organizations</strong> — from solo bloggers to Fortune 500 teams — break free from legacy CMS pain. We don't sell you a new CMS that you'll need to migrate away from in five years. We sell you a site that will still build and serve perfectly in a decade."
[about_story_p3]
other = "<em class=\"text-fg\">\"Static doesn't mean static content. Static means static infrastructure. Your content can be as dynamic as you want — it just happens to be pre-rendered, cached at the edge, and served in milliseconds.\"</em>"
[about_values_label]
other = "Our Values"
[about_value1_title]
other = "Speed Is a Feature"
[about_value1_desc]
other = "Every millisecond of load time costs you conversions and SEO rank. We optimize relentlessly because slow sites lose."
[about_value2_title]
other = "Security by Default"
[about_value2_desc]
other = "No PHP, no database, no plugin attack surface. Static sites are inherently secure — we never compromise that."
[about_value3_title]
other = "Knowledge Transfer"
[about_value3_desc]
other = "We don't create dependency on us. Every migration ends with training, documentation, and a workflow your team owns."

# ─── Services ───
[services_label]
other = "What We Do"
[services_title]
other = "Our Services"
[services_desc]
other = "End-to-end migration from legacy CMS to Hugo. Every project includes a free audit, full SEO preservation, and team training."

[services_s1_title]
other = "01. Full CMS Migration"
[services_s1_desc]
other = "Complete migration from WordPress, Drupal, Joomla, or any PHP-based CMS to Hugo. We extract every post, page, media file, user comment, and metadata field — converting them to clean Markdown with front matter. Your content structure, taxonomies, and relationships are preserved."
[services_s1_item1]
other = "Automated export scripts for all major CMS platforms"
[services_s1_item2]
other = "Custom content mapping for non-standard post types"
[services_s1_item3]
other = "Media library migration with image optimization"
[services_s1_item4]
other = "User accounts & permission mapping (if needed)"
[services_s1_item5]
other = "Database-to-Markdown conversion with zero data loss"

[services_s2_title]
other = "02. Theme Development"
[services_s2_desc]
other = "We build lightweight, responsive Hugo themes from scratch. No bloated frameworks, no jQuery — just modern CSS Grid, semantic HTML, and Go templates. Every theme scores 95+ on Lighthouse out of the box."
[services_s2_item1]
other = "Custom design aligned with your brand guidelines"
[services_s2_item2]
other = "Fully responsive: mobile, tablet, desktop"
[services_s2_item3]
other = "Dark mode support included"
[services_s2_item4]
other = "Accessible (WCAG 2.1 AA compliant)"
[services_s2_item5]
other = "Image lazy loading & responsive image sets"
[services_s2_item6]
other = "Built-in SEO metadata (Open Graph, Twitter Cards, JSON-LD)"

[services_s3_title]
other = "03. Performance Audit & Optimization"
[services_s3_desc]
other = "Already on Hugo or considering it? We'll audit your current site's performance, identify bottlenecks, and implement every optimization Hugo offers — from image processing pipelines to critical CSS inlining."
[services_s3_item1]
other = "Full Lighthouse & Web Vitals analysis"
[services_s3_item2]
other = "Image CDN & AVIF/WebP conversion"
[services_s3_item3]
other = "CSS/JS bundle splitting & minification"
[services_s3_item4]
other = "Preload / prefetch strategy"
[services_s3_item5]
other = "Cache policy & CDN configuration"
[services_s3_item6]
other = "Before/after performance report"

[services_s4_title]
other = "04. Ongoing Support & Training"
[services_s4_desc]
other = "We don't just hand over the keys — we make sure your team can run the site independently. Includes workflow training, content management setup (headless CMS optional), and a priority support SLA."
[services_s4_item1]
other = "Team workshop (up to 10 people, remote or on-site)"
[services_s4_item2]
other = "Detailed documentation tailored to your setup"
[services_s4_item3]
other = "CI/CD pipeline training (Git-based deployments)"
