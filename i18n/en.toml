# ─── Features (3 cards under speed) ───
[features_zerodb_title]
other = "Zero Database"
[features_zerodb_desc]
other = "No MySQL, no MariaDB, no query latency. Hugo serves flat HTML files from any CDN or server."
[features_nophp_title]
other = "No PHP Runtime"
[features_nophp_desc]
other = "No mod_php, no FastCGI, no memory limits. Your site is pure HTML — impossible to hack via plugin exploits."
[features_deploy_title]
other = "Deploy Anywhere"
[features_deploy_desc]
other = "Netlify, Vercel, Cloudflare Pages, S3, GitHub Pages — even a $5 VPS serves millions of hits."

