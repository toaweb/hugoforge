# ─── Services ───
[services_label]
other = "Hva vi gjør"
[services_title]
other = "Våre tjenester"
[services_desc]
other = "Komplett migrering fra legacy-CMS til Hugo. Hvert prosjekt inkluderer gratis analyse, full SEO-bevaring og teamopplæring."

[services_s1_title]
other = "01. Full CMS-migrering"
[services_s1_desc]
other = "Komplett migrering fra WordPress, Drupal, Joomla eller et hvilket som helst PHP-basert CMS til Hugo. Vi henter ut hvert innlegg, hver side, hver mediefil, hver brukerkommentar og hvert metadatafelt — og konverterer dem til ren Markdown med front matter. Innholdsstrukturen, taksonomiene og relasjonene dine bevares."
[services_s1_item1]
other = "Automatiserte eksportskript for alle store CMS-plattformer"
[services_s1_item2]
other = "Tilpasset innholdsmapping for ikke-standard posttyper"
[services_s1_item3]
other = "Migrering av mediebibliotek med bildeoptimalisering"
[services_s1_item4]
other = "Brukerkontoer & rettighetsmapping (ved behov)"
[services_s1_item5]
other = "Database-til-Markdown-konvertering uten datatap"

[services_s2_title]
other = "02. Temautvikling"
[services_s2_desc]
other = "Vi bygger lette og responsive Hugo-temaer fra bunnen av. Ingen oppblåste rammeverk, ingen jQuery — bare moderne CSS Grid, semantisk HTML og Go-templates. Hvert tema scorer 95+ på Lighthouse ut av boksen."
[services_s2_item1]
other = "Tilpasset design i tråd med merkevareprofilen"
[services_s2_item2]
other = "Fullt responsivt: mobil, nettbrett, desktop"
[services_s2_item3]
other = "Støtte for mørk modus inkludert"
[services_s2_item4]
other = "Tilgjengelig (WCAG 2.1 AA-kompatibelt)"
[services_s2_item5]
other = "Lazy loading av bilder & responsive bildesett"
[services_s2_item6]
other = "Innebygd SEO-metadata (Open Graph, Twitter Cards, JSON-LD)"

[services_s3_title]
other = "03. Ytelsesanalyse & optimalisering"
[services_s3_desc]
other = "Allerede på Hugo eller vurderer det? Vi analyserer ytelsen på det eksisterende nettstedet, identifiserer flaskehalser, og implementerer alle Hugo-optimaliseringer — fra bildebehandlings-pipelines til critical CSS-inlining."
[services_s3_item1]
other = "Full Lighthouse & Web Vitals-analyse"
[services_s3_item2]
other = "Bilde-CDN & AVIF/WebP-konvertering"
[services_s3_item3]
other = "CSS/JS bundle-splitting & minifisering"
[services_s3_item4]
other = "Preload / prefetch-strategi"
[services_s3_item5]
other = "Cache-policy & CDN-konfigurasjon"
[services_s3_item6]
other = "Før/etter-rapport på ytelse"

[services_s4_title]
other = "04. Løpende support & opplæring"
[services_s4_desc]
other = "Vi overleverer ikke bare nøklene — vi sørger for at teamet ditt kan drifte nettstedet selvstendig. Inkluderer opplæring i arbeidsflyt, oppsett av innholdsstyring (valgfritt headless CMS), og en prioritert support-SLA."
[services_s4_item1]
other = "Team-workshop (inntil 10 personer, eksternt eller på stedet)"
[services_s4_item2]
other = "Detaljert dokumentasjon tilpasset oppsettet ditt"
[services_s4_item3]
other = "Opplæring i CI/CD-pipeline (Git-baserte deployer)"
[services_s4_item4]
other = "Onboarding på headless CMS (Netlify CMS, Decap, osv.)"
[services_s4_item5]
other = "Prioritert Slack/e-post-support"
[services_s4_item6]
other = "Månedlige ytelsesrapporter"

