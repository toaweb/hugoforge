# ─── About ───
[about_label]
other = "Hvem vi er"
[about_title]
other = "Vi gjør statiske nettsider enkelt"

[about_founded]
other = "hugo://forge ble grunnlagt av Tor, en webutvikler og designer med over 20 års erfaring — siden 2001."
[about_p1]
other = "Gjennom to tiår har han bygget og administrert utallige WordPress-sider for bedrifter av alle størrelser, brukt Elementor, Divi og andre sidebyggere, og brukt utallige timer på å finne rask hosting og stable caching-plugins bare for å få lastetiden ned på et akseptabelt nivå."
[about_p2]
other = "Konklusjonen etter 20 år er enkel: WordPress er et fantastisk verktøy — men kun om du trenger å publisere nytt innhold hver eneste dag. For de aller fleste bedrifter er det ikke tilfellet."
[about_p3]
other = "En standard bedriftsside med forside og 3–5 undersider har ingenting å tjene på WordPress. Du betaler mer for hosting, sidene dine er tregere, og sikkerhetsrisikoen er langt høyere enn nødvendig. Har du delt hosting — det vanligste valget — kan siden din til og med time ut i høytrafikkperioder, fordi WordPress er ressurskrevende av natur."
[about_p4]
other = "Hugo snur dette på hodet. Siden genereres én gang og leveres som ren HTML fra Cloudflares globale nettverk. Ingen database. Ingen PHP. Ingen plugins å patche. Resultatet er sider som laster på millisekunder, tåler millioner av besøkende uten å svette, og faktisk kan hostes gratis."
[about_quote]
other = "Vi selger deg ikke et nytt CMS du må migrere bort fra om fem år. Vi selger deg et nettsted som fortsatt bygger og leverer perfekt om ti år."

