# ─── Features (3 cards under speed) ───
[features_zerodb_title]
other = "Ingen database"
[features_zerodb_desc]
other = "Ingen MySQL, ingen MariaDB, ingen spørretreghet. Hugo serverer flate HTML-filer fra hvilken som helst CDN eller server."
[features_nophp_title]
other = "Ingen PHP-runtime"
[features_nophp_desc]
other = "Ingen mod_php, ingen FastCGI, ingen minnegrenser. Nettstedet ditt er ren HTML — umulig å hacke via plugin-utnyttelser."
[features_deploy_title]
other = "Deploy hvor som helst"
[features_deploy_desc]
other = "Netlify, Vercel, Cloudflare Pages, S3, GitHub Pages — selv en VPS til 50 kr serverer millioner av treff."

# ─── Checklist ───
[checklist_label]
other = "#2. Migreringsplan"
[checklist_title]
other = "Fra legacy til Hugo i 6 trinn"
[checklist_desc]
other = "Vi håndterer hver fase. Nettstedet ditt er oppe gjennom hele migreringen — null nedetid."
[checklist_step1_title]
other = "Kartlegging & analyse"
[checklist_step1_desc]
other = "Vi gjennomgår eksisterende nettsted, kartlegger alle innholdstyper og identifiserer egendefinerte posttyper, plugins og moduler."
[checklist_step2_title]
other = "Innholdsuthenting"
[checklist_step2_desc]
other = "Eksporter alle innlegg, sider, media og metadata. Konverter WordPress/Drupal-markup til ren Markdown."
[checklist_step3_title]
other = "Temautvikling"
[checklist_step3_desc]
other = "Bygg et tilpasset Hugo-tema som matcher merkevaren din. Responsivt, tilgjengelig og 10× lettere enn det gamle temaet."
[checklist_step4_title]
other = "URL-mapping & viderekoblinger"
[checklist_step4_desc]
other = "Behold alle SEO-rangeringer med 1:1 URL-mapping. Sett opp 301-viderekoblinger for eventuelle strukturelle endringer."
[checklist_step5_title]
other = "Bygg & forhåndsvisning"
[checklist_step5_desc]
other = "Vi genererer hele det statiske nettstedet på en staging-URL. Du gjennomgår hver side før lansering."
[checklist_step6_title]
other = "Deploy & overlevering"
[checklist_step6_desc]
other = "Publiser til CDN, konfigurer HTTPS, sett opp deploy-hooks. Vi lærer opp teamet ditt på Hugo-arbeidsflyten."
[checklist_chip1]
other = "⏱ Typisk migrering: 2–4 uker"
[checklist_chip2]
other = "📉 90 %+ reduksjon i lastetid"
[checklist_chip3]
other = "🔒 Ingen sikkerhetsoppdateringer nødvendig"

# ─── Why Hugo? ───
[why_label]
other = "#3. Hvorfor Hugo?"
[why_title]
other = "Bygget for team som leverer"
[why_desc]
other = "Enten du er utvikler som optimaliserer verktøykjeden eller leder som kutter kostnader — Hugo leverer."
[why_tab_dev]
other = "FOR UTVIKLERE"
[why_tab_business]
other = "FOR BEDRIFTER"
[why_view_services]
other = "→ Se alle tjenester"

[why_dev1_title]
other = "⚡ Bygg på under et sekund"
[why_dev1_desc]
other = "Hugo kompilerer 10 000+ sider på under 2 sekunder. Ingen byggeserver nødvendig — bare <code class=\"text-accent\">hugo</code> på hvilken som helst maskin."
[why_dev2_title]
other = "📝 Markdown-basert"
[why_dev2_desc]
other = "Skriv i Markdown med shortcodes. Git-vennlig innhold som hele teamet kan versjonere."
[why_dev3_title]
other = "🔧 Full malkontroll"
[why_dev3_desc]
other = "Go-templates gir deg løkker, betingelser, partials og paginering — uten et CMS-pluginøkosystem."
[why_dev4_title]
other = "📦 Én binærfil"
[why_dev4_desc]
other = "Én <code class=\"text-accent\">hugo</code>-binær, null avhengigheter. Installer via brew, apt eller nedlasting — kjører overalt."
[why_dev5_title]
other = "🔄 Hot reload"
[why_dev5_desc]
other = "<code class=\"text-accent\">hugo server</code> med live reload. Endre en Markdown-fil og se resultatet i nettleseren umiddelbart."
[why_dev6_title]
other = "🌐 i18n & flerspråklig"
[why_dev6_desc]
other = "Innebygd internasjonalisering. Ett innholdstre, flere språk, automatisk URL-lokalisering."
[why_dev7_title]
other = "📊 Build hooks & CI/CD"
[why_dev7_desc]
other = "Én kommando deployer: <code class=\"text-accent\">hugo && netlify deploy</code>. Integrerer med GitHub Actions, GitLab CI, Jenkins."
[why_dev8_title]
other = "📸 Bildebehandling"
[why_dev8_desc]
other = "Endre størrelse, beskjær, roter og konverter bilder ved byggetid. Ingen JavaScript nødvendig. Responsive bilder rett ut av boksen."

[why_biz1_title]
other = "💰 80 % lavere driftskostnader"
[why_biz1_desc]
other = "Statisk HTML på en CDN koster nesten ingenting. Ingen managed WordPress-hosting til 2000 kr/mnd. Ingen databaseserver."
[why_biz2_title]
other = "🚀 100× raskere sidelasting"
[why_biz2_desc]
other = "Ingen databasespørringer, ingen PHP-kjøring. Sider lastes umiddelbart — forbedrer Core Web Vitals og SEO-rangering."
[why_biz3_title]
other = "🔒 Null sikkerhetsflate"
[why_biz3_desc]
other = "Ingen WordPress-plugin-sårbarheter. Ingen Drupal-modul-utnyttelser. Ingen PHP-runtime å patche. Aldri."
[why_biz4_title]
other = "♻️ Aldri bygg om igjen"
[why_biz4_desc]
other = "Et Hugo-nettsted fra 2018 bygger fortsatt på dagens Hugo. Ingen avhengighetsråte, ingen rammeverk-bytte."
[why_biz5_title]
other = "📈 Bedre SEO ut av boksen"
[why_biz5_desc]
other = "Perfekte Lighthouse-poeng. Ingen render-blokkerende JS. Ren semantisk HTML som søkemotorer elsker."
[why_biz6_title]
other = "👩‍💻 Utviklere er tilgjengelige"
[why_biz6_desc]
other = "Hugo bruker Go-templates — et utbredt språk. Slipp å lete etter nisje-WordPress/PHP-utviklere."
[why_biz7_title]
other = "📱 Ekte headless CMS"
[why_biz7_desc]
other = "Kombiner Hugo med Netlify CMS, Forestry eller Decap CMS. Redaktørene får et grensesnitt — nettstedet forblir statisk."
[why_biz8_title]
other = "📋 Revisjonsklar"
[why_biz8_desc]
other = "Hver deploy er en Git-commit. Full endringshistorikk. Tilbakerulling med ett klikk. Compliance-team elsker dette."

