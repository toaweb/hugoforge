      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF9D"/>
      <stop offset="100%" stop-color="#00CCAA"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg-grad)"/>

  <g stroke="#1A1A1A" stroke-width="1" opacity="0.8">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <rect x="0" y="0" width="6" height="630" fill="url(#accent-grad)"/>

  <g font-family="Ubuntu Mono, DejaVu Sans Mono, monospace">
    <text x="80" y="320" font-size="76" font-weight="bold" fill="#FFFFFF">&gt;_</text>
    <text x="180" y="320" font-size="76" font-weight="bold" fill="#00FF9D">hugo://forge</text>

    <text x="80" y="395" font-size="28" fill="#777777">Ditch WordPress &amp; Drupal. Go </text>
    <text x="640" y="395" font-size="28" font-weight="bold" fill="#00FF9D">100x faster</text>
    <text x="860" y="395" font-size="28" fill="#777777"> with Hugo.</text>

    <rect x="80" y="440" width="1040" height="1" fill="#2A2A2A"/>

    <g transform="translate(80,475)">
      <path d="M14 4 L4 22 L13 22 L8 36 L24 16 L15 16 Z" fill="#00FF9D"/>
      <text x="44" y="22" font-size="18" fill="#777777">Builds in milliseconds</text>
    </g>

    <g transform="translate(420,475)">
      <rect x="6" y="14" width="22" height="18" rx="2" fill="none" stroke="#00FF9D" stroke-width="3"/>
      <path d="M10 14 L10 8 a7 7 0 0 1 14 0 L24 14" fill="none" stroke="#00FF9D" stroke-width="3"/>
      <text x="44" y="32" font-size="18" fill="#777777">No database. No PHP.</text>
    </g>

    <g transform="translate(760,475)">
      <circle cx="17" cy="23" r="13" fill="none" stroke="#00FF9D" stroke-width="3"/>
      <line x1="4" y1="23" x2="30" y2="23" stroke="#00FF9D" stroke-width="3"/>
      <path d="M17 10 q-8 13 0 26" fill="none" stroke="#00FF9D" stroke-width="3"/>
      <path d="M17 10 q8 13 0 26" fill="none" stroke="#00FF9D" stroke-width="3"/>
      <text x="44" y="32" font-size="18" fill="#777777">Global CDN. Zero servers.</text>
    </g>

    <text x="80" y="585" font-size="20" fill="#2A2A2A">hugoforge.toaweb.com</text>
  </g>

  <rect x="1140" y="0" width="60" height="60" fill="none" stroke="#00FF9D" stroke-width="2" opacity="0.3"/>
  <rect x="0" y="570" width="60" height="60" fill="none" stroke="#00FF9D" stroke-width="2" opacity="0.3"/>
