<section class="text-center py-24">
  <div class="max-w-[1200px] mx-auto px-6">
    <div class="text-xs text-accent uppercase tracking-[0.1em] mb-2">{{ i18n "cta_label" }}</div>
    <h2 class="text-2xl md:text-4xl font-bold text-fg-heading max-w-[720px] mx-auto mb-4">{{ i18n "cta_title" }}</h2>
    <p class="text-muted max-w-[520px] mx-auto mb-8">{{ i18n "cta_desc" }}</p>
    <div class="flex gap-3 justify-center flex-wrap">
      <a href="{{ "/#contact" | relLangURL }}" class="inline-flex items-center gap-2 px-7 py-3 rounded-lg font-mono text-[15px] font-bold bg-accent text-bg hover:opacity-85 transition-opacity">{{ i18n "cta_btn_audit" }}</a>
      <a href="{{ "/#about" | relLangURL }}" class="inline-flex items-center gap-2 px-7 py-3 rounded-lg font-mono text-[15px] font-bold bg-transparent border border-border text-fg hover:border-fg hover:text-fg-heading transition-colors">{{ i18n "cta_btn_about" }}</a>
    </div>
  </div>
</section>
